<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>MyMoney — Financial Command Center</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body { font-family: -apple-system, BlinkMacSystemFont, sans-serif; background: #f9f9f7; color: #1a1a18; padding: 16px; }
.wrap { max-width: 640px; margin: 0 auto; padding: 1rem 0 2rem; }
.section-label { font-size: 10px; font-weight: 600; letter-spacing: 0.1em; text-transform: uppercase; color: #888; margin-bottom: 10px; }
.card { background: #fff; border: 0.5px solid #e0e0d8; border-radius: 12px; padding: 16px 18px; margin-bottom: 12px; }
.metric { background: #f1efe8; border-radius: 8px; padding: 12px 14px; }
.metric-label { font-size: 11px; color: #888; margin-bottom: 3px; }
.metric-value { font-size: 19px; font-weight: 700; }
.metric-sub { font-size: 11px; margin-top: 2px; color: #888; }
.grid-4 { display: grid; grid-template-columns: repeat(4,minmax(0,1fr)); gap: 10px; margin-bottom: 14px; }
.grid-2 { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 12px; }
.grid-3 { display: grid; grid-template-columns: repeat(3,minmax(0,1fr)); gap: 10px; margin-bottom: 14px; }
.tab-bar { display: flex; gap: 4px; margin-bottom: 18px; flex-wrap: wrap; }
.tab-btn { padding: 6px 14px; font-size: 12px; border: 0.5px solid #ccc; border-radius: 8px; background: transparent; color: #666; cursor: pointer; font-family: inherit; }
.tab-btn.active { background: #1a1a18; color: #fff; border-color: #1a1a18; }
.panel { display: none; }
.panel.active { display: block; }
.row { display: flex; justify-content: space-between; align-items: center; padding: 8px 0; border-bottom: 0.5px solid #e0e0d8; font-size: 13px; }
.row:last-child { border-bottom: none; }
.badge { display: inline-block; font-size: 10px; padding: 2px 7px; border-radius: 6px; font-weight: 600; }
.bg-green { background: #EAF3DE; color: #3B6D11; }
.bg-amber { background: #FAEEDA; color: #854F0B; }
.bg-blue { background: #E6F1FB; color: #185FA5; }
.bg-purple { background: #EEEDFE; color: #534AB7; }
.bg-red { background: #FCEBEB; color: #A32D2D; }
.bar-wrap { height: 7px; background: #f1efe8; border-radius: 4px; overflow: hidden; }
.bar { height: 100%; border-radius: 4px; }
.alloc-row { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; font-size: 12px; }
.acct-row { display: flex; align-items: center; gap: 12px; padding: 9px 0; border-bottom: 0.5px solid #e0e0d8; font-size: 13px; }
.acct-row:last-child { border-bottom: none; }
.acct-icon { width: 28px; height: 28px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; flex-shrink: 0; }
.acct-name { flex: 1; }
.acct-sub { font-size: 11px; color: #888; margin-top: 1px; }
.divider { border: none; border-top: 0.5px solid #e0e0d8; margin: 12px 0; }
.back-btn { display: inline-block; font-size: 12px; color: #666; text-decoration: none; margin-bottom: 16px; padding: 4px 0; }
.loading { color: #888; font-size: 13px; text-align: center; padding: 40px 0; }
</style>
</head>
<body>
<div class="wrap">
<a href="index.html" class="back-btn">← Back to MyMoney</a>
<div style="font-size:11px;font-weight:600;letter-spacing:0.12em;text-transform:uppercase;color:#888;margin-bottom:4px;">MyMoney</div>
<div style="display:flex;align-items:baseline;justify-content:space-between;margin-bottom:8px;flex-wrap:wrap;gap:8px;">
  <div><div style="font-size:20px;font-weight:700;">Financial command center</div><div style="font-size:13px;color:#666;margin-top:2px;" id="subtitle">Loading...</div></div>
  <span class="badge bg-green" id="updated-badge">Loading...</span>
</div>

<div class="tab-bar">
  <button class="tab-btn active" onclick="showTab('overview')">Overview</button>
  <button class="tab-btn" onclick="showTab('accounts')">Accounts</button>
  <button class="tab-btn" onclick="showTab('savings')">Savings Goals</button>
  <button class="tab-btn" onclick="showTab('income')">Income & tax</button>
</div>

<div id="tab-overview" class="panel active"><div class="loading">Loading data...</div></div>
<div id="tab-accounts" class="panel"><div class="loading">Loading data...</div></div>
<div id="tab-savings" class="panel"><div class="loading">Loading data...</div></div>
<div id="tab-income" class="panel"><div class="loading">Loading data...</div></div>

</div>

<script>
var BASE = 'https://docs.google.com/spreadsheets/d/e/2PACX-1vQPv7R_VonKc-zi9YTV_WiEkB1hmjW6bBskPSqAhQFtZUbLfPR9WeD6LDJYhCIThuziE0uhRWoPPh9w/pub';
var GIDS = {
  snapshot:      '270306645',
  accounts:      '0',
  savingsGoals:  '1378910221',
  kids:          '607695056',
  income:        '2084993096',
  allocations:   '2068010017',
  holdings:      '866457208',
  retirementSplit: '1611246416'
};

function url(gid) { return BASE + '?gid=' + gid + '&single=true&output=csv'; }

function parseCSV(text) {
  var lines = text.trim().split('\n');
  var headers = lines[0].split(',').map(function(h){ return h.trim().replace(/^"|"$/g,''); });
  return lines.slice(1).map(function(line) {
    var vals = line.match(/(".*?"|[^,]+|(?<=,)(?=,)|^(?=,)|(?<=,)$)/g) || [];
    var obj = {};
    headers.forEach(function(h, i) {
      obj[h] = (vals[i] || '').trim().replace(/^"|"$/g,'');
    });
    return obj;
  });
}

function parseKV(rows) {
  var obj = {};
  rows.forEach(function(r) { obj[r.key] = r.value; });
  return obj;
}

function fmt(n) {
  n = parseFloat(n);
  if (isNaN(n)) return '—';
  if (Math.abs(n) >= 1000000) return '$' + (n/1000000).toFixed(1) + 'M';
  if (Math.abs(n) >= 1000) return '$' + Math.round(n/1000) + 'K';
  return '$' + n.toLocaleString();
}

function fmtFull(n) {
  n = parseFloat(n);
  if (isNaN(n)) return '—';
  return '$' + Math.round(n).toLocaleString();
}

function pct(n) { return parseFloat(n).toFixed(1) + '%'; }

function acctColor(type) {
  if (type === '401k') return {bg:'#EAF3DE', fg:'#3B6D11', letter:'F', badgeClass:'bg-blue', badgeText:'401k'};
  if (type === 'roth') return {bg:'#EEEDFE', fg:'#534AB7', letter:'V', badgeClass:'bg-purple', badgeText:'Roth'};
  if (type === 'taxable') return {bg:'#E6F1FB', fg:'#185FA5', letter:'V', badgeClass:'bg-green', badgeText:'Taxable'};
  if (type === 'stock') return {bg:'#EAF3DE', fg:'#3B6D11', letter:'F', badgeClass:'bg-amber', badgeText:'Stock'};
  if (type === 'goal') return {bg:'#E6F1FB', fg:'#185FA5', letter:'V', badgeClass:'bg-amber', badgeText:'Goal'};
  return {bg:'#FAEEDA', fg:'#854F0B', letter:'E', badgeClass:'bg-amber', badgeText:'Other'};
}

function fetchTab(gid) {
  return fetch(url(gid)).then(function(r){ return r.text(); }).then(parseCSV);
}

Promise.all([
  fetchTab(GIDS.snapshot),
  fetchTab(GIDS.accounts),
  fetchTab(GIDS.savingsGoals),
  fetchTab(GIDS.kids),
  fetchTab(GIDS.income),
  fetchTab(GIDS.retirementSplit)
]).then(function(results) {
  var snapRows = results[0];
  var accounts = results[1];
  var savingsGoals = results[2];
  var kids = results[3];
  var incomeRows = results[4];
  var retirementSplit = results[5];

  var snap = parseKV(snapRows);
  var inc = parseKV(incomeRows);

  // Update header
  document.getElementById('subtitle').textContent = 'Ray family · ' + snap.nw_date + ' · Nick ' + snap.nick_age + ' · Emily ' + snap.emily_age;
  document.getElementById('updated-badge').textContent = snap.updated + ' ✓';

  // NW calculations
  var nw = parseFloat(snap.nw);
  var invested = parseFloat(snap.invested);
  var prevDec = parseFloat(snap.nw_prev_dec);
  var dec2025 = parseFloat(snap.nw_dec_2025);
  var gain15mo = nw - prevDec;
  var gainPct15mo = ((gain15mo / prevDec) * 100).toFixed(1);
  var gain2025 = dec2025 - prevDec;
  var gainPct2025 = ((gain2025 / prevDec) * 100).toFixed(1);
  var gainYTD = nw - dec2025;
  var gainPctYTD = ((gainYTD / dec2025) * 100).toFixed(1);

  // OVERVIEW TAB
  var totalAccounts = accounts.reduce(function(s,a){ return s + parseFloat(a.balance||0); }, 0);
  var retirementTotal = accounts.filter(function(a){ return a.type==='401k'||a.type==='roth'; }).reduce(function(s,a){ return s+parseFloat(a.balance||0);},0);
  var taxableTotal = accounts.filter(function(a){ return a.type==='taxable'; }).reduce(function(s,a){ return s+parseFloat(a.balance||0);},0);
  // True Roth total = all roth_balance from Retirement Split tab (includes 401k Roth + Roth IRAs)
  var rothTotal = retirementSplit.reduce(function(s,r){ return s + parseFloat(r.roth_balance||0); }, 0);
  var goalTotal = accounts.filter(function(a){ return a.type==='goal'; }).reduce(function(s,a){ return s+parseFloat(a.balance||0);},0);
  // Use invested from snapshot as base for portfolio split percentages to avoid double counting
  var splitBase = parseFloat(snap.invested) || totalAccounts;
  var retirePct = Math.round(retirementTotal/splitBase*100);
  var taxablePct = Math.round(taxableTotal/splitBase*100);
  var rothPct = Math.round(rothTotal/splitBase*100);
  var progressPct = Math.round(invested/6100000*100);

  // Savings goals totals
  var capOne = savingsGoals.filter(function(g){ return g.institution==='Capital One'; }).reduce(function(s,g){ return s+parseFloat(g.balance||0);},0);
  var vangGoals = savingsGoals.filter(function(g){ return g.institution==='Vanguard'; }).reduce(function(s,g){ return s+parseFloat(g.balance||0);},0);
  var totalGoals = capOne + vangGoals;

  // Kids totals
  var kids529 = kids.filter(function(k){ return k.type==='529'; }).reduce(function(s,k){ return s+parseFloat(k.balance||0);},0);
  var kidsUtma = kids.filter(function(k){ return k.type==='utma'; }).reduce(function(s,k){ return s+parseFloat(k.balance||0);},0);
  var kidsTotal = kids529 + kidsUtma;

  var overviewHTML = '<div class="grid-4">' +
    '<div class="metric"><div class="metric-label">Personal net worth</div><div class="metric-value">' + fmt(nw) + '</div><div class="metric-sub" style="color:#3B6D11;">↑ ' + fmt(gain15mo) + ' since Dec \'24</div></div>' +
    '<div class="metric"><div class="metric-label">Total invested</div><div class="metric-value">' + fmt(invested) + '</div><div class="metric-sub">Retirement + brokerage</div></div>' +
    '<div class="metric"><div class="metric-label">Annual savings</div><div class="metric-value">' + fmt(inc.contrib_total) + '</div><div class="metric-sub" style="color:#3B6D11;">All vehicles maxed</div></div>' +
    '<div class="metric"><div class="metric-label">Projected at 55</div><div class="metric-value">$6.1M</div><div class="metric-sub" style="color:#3B6D11;">Base case · Nov 2037</div></div>' +
    '</div>' +
    '<div class="grid-2">' +
    '<div class="card"><div class="section-label">Investment progress to $6.1M retirement</div>' +
    '<div style="margin-bottom:6px;"><div style="font-size:11px;color:#888;margin-bottom:4px;">' + fmt(invested) + ' invested of $6.1M projected · ' + progressPct + '%</div>' +
    '<div class="bar-wrap" style="height:12px;"><div class="bar" style="width:' + progressPct + '%;background:#378ADD;"></div></div>' +
    '<div style="display:flex;justify-content:space-between;font-size:11px;margin-top:4px;"><span style="color:#3B6D11;">' + fmt(invested) + ' today</span><span style="color:#888;">$6.1M at 55</span></div></div>' +
    '<div class="divider"></div>';

  accounts.forEach(function(a) {
    var c = acctColor(a.type);
    overviewHTML += '<div class="row"><span style="color:#666;">' + a.name + '</span><span style="font-weight:700;">' + fmtFull(a.balance) + '</span></div>';
  });

  overviewHTML += '<div class="divider"></div>' +
    '<div class="row"><span style="font-weight:700;">Total invested</span><span style="font-weight:700;color:#3B6D11;font-size:14px;">' + fmtFull(totalAccounts) + '</span></div>' +
    '<div style="font-size:11px;color:#888;margin-top:6px;">Personal NW ' + fmt(nw) + ' includes home + car equity, savings goals, emergency fund, and credit balances.</div>' +
    '</div>' +
    '<div class="card"><div class="section-label">Portfolio split</div>' +
    '<div class="alloc-row"><div style="width:120px;color:#666;">401k (pretax + Roth)</div><div style="flex:1;"><div class="bar-wrap"><div class="bar" style="width:' + retirePct + '%;background:#378ADD;"></div></div></div><div style="width:90px;text-align:right;font-weight:700;">' + fmt(retirementTotal) + ' · ' + retirePct + '%</div></div>' +
    '<div class="alloc-row"><div style="width:120px;color:#666;">Taxable brokerage</div><div style="flex:1;"><div class="bar-wrap"><div class="bar" style="width:' + taxablePct + '%;background:#1D9E75;"></div></div></div><div style="width:90px;text-align:right;font-weight:700;">' + fmt(taxableTotal) + ' · ' + taxablePct + '%</div></div>' +
    '<div class="alloc-row" style="margin-bottom:0;"><div style="width:120px;color:#666;">Roth IRAs</div><div style="flex:1;"><div class="bar-wrap"><div class="bar" style="width:' + rothPct + '%;background:#7F77DD;"></div></div></div><div style="width:90px;text-align:right;font-weight:700;">' + fmt(rothTotal) + ' · ' + rothPct + '%</div></div>' +
    '<div class="divider"></div>' +
    '<div class="section-label" style="margin-bottom:8px;">Outside investment total</div>' +
    '<div class="row"><span style="color:#666;">Emergency fund</span><span style="font-weight:700;">$97.7K</span></div>' +
    '<div class="row"><span style="color:#666;">Savings goals</span><span style="font-weight:700;">' + fmt(totalGoals) + '</span></div>' +
    '<div class="row"><span style="color:#666;">Kids (529s + UTMAs)</span><span style="font-weight:700;">' + fmt(kidsTotal) + '</span></div>' +
    '</div></div>' +
    '<div class="card"><div class="section-label">Net worth trend</div>' +
    '<div style="display:flex;align-items:flex-start;gap:0;margin:12px 0;">' +
    '<div style="flex:1;text-align:center;"><div style="font-size:10px;color:#888;margin-bottom:4px;">Dec 31, 2024</div><div style="font-size:15px;font-weight:700;">' + fmt(prevDec) + '</div><div style="font-size:11px;color:#888;margin-top:2px;">Baseline</div></div>' +
    '<div style="flex:1;position:relative;margin-top:18px;"><div style="height:2px;background:#378ADD;width:100%;"></div><div style="position:absolute;top:-14px;left:0;right:0;text-align:center;font-size:10px;color:#3B6D11;white-space:nowrap;">+' + fmt(gain2025) + ' · +' + gainPct2025 + '%</div></div>' +
    '<div style="flex:1;text-align:center;"><div style="font-size:10px;color:#888;margin-bottom:4px;">Dec 31, 2025</div><div style="font-size:15px;font-weight:700;">' + fmt(dec2025) + '</div><div style="font-size:11px;color:#3B6D11;margin-top:2px;">↑ +' + gainPct2025 + '%</div></div>' +
    '<div style="flex:1;position:relative;margin-top:18px;"><div style="height:2px;background:#1D9E75;width:100%;"></div><div style="position:absolute;top:-14px;left:0;right:0;text-align:center;font-size:10px;color:#3B6D11;white-space:nowrap;">+' + fmt(gainYTD) + ' · +' + gainPctYTD + '%</div></div>' +
    '<div style="flex:1;text-align:center;"><div style="font-size:10px;color:#888;margin-bottom:4px;">' + snap.nw_date + '</div><div style="font-size:15px;font-weight:700;">' + fmt(nw) + '</div><div style="font-size:11px;color:#3B6D11;margin-top:2px;">↑ +' + gainPctYTD + '% YTD</div></div>' +
    '</div>' +
    '<div style="font-size:11px;color:#888;text-align:center;margin-top:4px;">15-month total: +' + fmt(gain15mo) + ' · +' + gainPct15mo + '% · ~16% annualized</div>' +
    '</div>';

  document.getElementById('tab-overview').innerHTML = overviewHTML;

  // ACCOUNTS TAB
  var accountsHTML = '<div class="card"><div class="section-label">All investment accounts — ' + snap.nw_date + '</div>';
  accounts.forEach(function(a) {
    var c = acctColor(a.type);
    var instLetter = a.institution === 'Fidelity' ? 'F' : a.institution === 'Vanguard' ? 'V' : 'E';
    accountsHTML += '<div class="acct-row">' +
      '<div class="acct-icon" style="background:' + c.bg + ';color:' + c.fg + ';">' + instLetter + '</div>' +
      '<div class="acct-name"><div>' + a.name + (a.last4 ? ' <span style="font-size:11px;color:#888;">···' + a.last4 + '</span>' : '') + '</div>' +
      '<div class="acct-sub">' + (a.note || '') + '</div></div>' +
      '<div style="text-align:right;"><div style="font-weight:700;">' + fmtFull(a.balance) + '</div><span class="badge ' + c.badgeClass + '">' + c.badgeText + '</span></div>' +
      '</div>';
  });
  accountsHTML += '<div class="divider"></div><div style="display:flex;justify-content:space-between;font-size:14px;font-weight:700;"><span>Total invested</span><span style="color:#3B6D11;font-size:16px;">' + fmtFull(totalAccounts) + '</span></div>' +
    '<div style="font-size:11px;color:#888;text-align:right;margin-top:3px;">Excl. emergency fund · savings goals · kids accounts</div></div>';

  // Kids section
  accountsHTML += '<div class="card"><div class="section-label">Kids accounts — tracked separately</div>';
  kids.forEach(function(k) {
    accountsHTML += '<div class="row"><span style="color:#666;">' + k.name + (k.start_year ? ' <span style="font-size:10px;color:#888;">(' + k.note + ')</span>' : '') + '</span><span style="font-weight:700;">' + fmtFull(k.balance) + '</span></div>';
  });
  accountsHTML += '<div class="divider"></div><div class="row"><span style="font-weight:700;">Kids total</span><span style="font-weight:700;color:#185FA5;">' + fmtFull(kidsTotal) + '</span></div></div>';

  // Retirement split section
  var totalPretax = retirementSplit.reduce(function(s,r){ return s + parseFloat(r.pretax_balance||0); }, 0);
  var totalRoth401k = retirementSplit.reduce(function(s,r){ return s + parseFloat(r.roth_balance||0); }, 0);
  var totalSplit = totalPretax + totalRoth401k;
  var pretaxPct = Math.round(totalPretax / totalSplit * 100);
  var rothPct401k = Math.round(totalRoth401k / totalSplit * 100);

  accountsHTML += '<div class="card"><div class="section-label">401k pretax vs Roth split — verified ' + snap.nw_date + '</div>';
  accountsHTML += '<div style="font-size:11px;color:#888;margin-bottom:12px;">Fidelity shows pretax and Roth as separate balances within the same account. Funds are shared — the split is for tax planning and Roth conversion modeling only.</div>';

  retirementSplit.forEach(function(r) {
    var pre = parseFloat(r.pretax_balance||0);
    var rth = parseFloat(r.roth_balance||0);
    var tot = pre + rth;
    var prePct = Math.round(pre/tot*100);
    var rthPct = Math.round(rth/tot*100);
    accountsHTML += '<div style="margin-bottom:12px;padding-bottom:12px;border-bottom:0.5px solid #e0e0d8;">' +
      '<div style="display:flex;justify-content:space-between;font-size:13px;font-weight:700;margin-bottom:6px;">' +
      '<span>' + r.account + ' <span style="font-size:11px;color:#888;">···' + r.last4 + '</span></span>' +
      '<span>' + fmt(tot) + '</span></div>' +
      '<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:4px;">' +
      '<div style="width:' + prePct + '%;background:#378ADD;"></div>' +
      '<div style="width:' + rthPct + '%;background:#7F77DD;"></div>' +
      '</div>' +
      '<div style="display:flex;justify-content:space-between;font-size:11px;">' +
      '<span style="color:#378ADD;">Pretax ' + fmt(pre) + ' · ' + prePct + '%</span>' +
      '<span style="color:#7F77DD;">Roth ' + fmt(rth) + ' · ' + rthPct + '%</span>' +
      '</div></div>';
  });

  accountsHTML += '<div style="display:flex;height:8px;border-radius:4px;overflow:hidden;margin-bottom:6px;">' +
    '<div style="width:' + pretaxPct + '%;background:#378ADD;"></div>' +
    '<div style="width:' + rothPct401k + '%;background:#7F77DD;"></div>' +
    '</div>' +
    '<div style="display:flex;justify-content:space-between;font-size:12px;font-weight:700;">' +
    '<span style="color:#378ADD;">Total pretax ' + fmt(totalPretax) + ' · ' + pretaxPct + '%</span>' +
    '<span style="color:#7F77DD;">Total Roth ' + fmt(totalRoth401k) + ' · ' + rothPct401k + '%</span>' +
    '</div></div>';

  document.getElementById('tab-accounts').innerHTML = accountsHTML;

  // SAVINGS GOALS TAB
  var savingsHTML = '<div class="grid-3">' +
    '<div class="metric"><div class="metric-label">Total savings goals</div><div class="metric-value">' + fmt(totalGoals) + '</div><div class="metric-sub">Capital One ' + fmt(capOne) + ' + Weddings ' + fmt(vangGoals) + '</div></div>' +
    '<div class="metric"><div class="metric-label">Emergency fund</div><div class="metric-value">$97.7K</div><div class="metric-sub">MM $76.2K + IBonds $21.5K</div></div>' +
    '<div class="metric"><div class="metric-label">Kids 529s + UTMAs</div><div class="metric-value">' + fmt(kidsTotal) + '</div><div class="metric-sub">529s ' + fmt(kids529) + ' · UTMAs ' + fmt(kidsUtma) + '</div></div>' +
    '</div>';

  // Capital One goals
  var capOneGoals = savingsGoals.filter(function(g){ return g.institution === 'Capital One'; });
  savingsHTML += '<div class="card"><div class="section-label">Capital One — savings goals · ' + fmt(capOne) + '</div>';
  capOneGoals.forEach(function(g) {
    savingsHTML += '<div class="row"><span style="color:#666;">' + g.name + (g.note ? ' <span style="font-size:10px;color:#888;">(' + g.note + ')</span>' : '') + '</span><span style="font-weight:700;">' + fmtFull(g.balance) + '</span></div>';
  });
  savingsHTML += '</div>';

  // Vanguard goals
  var vangGoalsList = savingsGoals.filter(function(g){ return g.institution === 'Vanguard'; });
  savingsHTML += '<div class="card"><div class="section-label">Vanguard — savings goals · ' + fmt(vangGoals) + '</div>';
  vangGoalsList.forEach(function(g) {
    savingsHTML += '<div class="row"><span style="color:#666;">' + g.name + (g.note ? ' <span style="font-size:10px;color:#888;">(' + g.note + ')</span>' : '') + '</span><span style="font-weight:700;">' + fmtFull(g.balance) + '</span></div>';
  });
  savingsHTML += '</div>';

  // Kids
  var kids529List = kids.filter(function(k){ return k.type==='529'; });
  var kidsUtmaList = kids.filter(function(k){ return k.type==='utma'; });
  savingsHTML += '<div class="card"><div class="section-label">Kids — 529s + UTMAs · ' + fmt(kidsTotal) + '</div>';
  kids529List.forEach(function(k) {
    var yrs = k.start_year ? (parseInt(k.start_year) - 2026) : null;
    savingsHTML += '<div class="row"><span style="color:#666;">' + k.name + ' — starts ' + k.note + '</span><span><span class="badge ' + (yrs && yrs<=5?'bg-amber':'bg-blue') + '" style="margin-right:6px;">' + (yrs?yrs+' yrs':'') + '</span><span style="font-weight:700;">' + fmtFull(k.balance) + '</span></span></div>';
  });
  kidsUtmaList.forEach(function(k) {
    savingsHTML += '<div class="row"><span style="color:#666;">' + k.name + '</span><span style="font-weight:700;">' + fmtFull(k.balance) + '</span></div>';
  });
  savingsHTML += '<div class="divider"></div><div class="row"><span style="font-weight:700;">Kids total</span><span style="font-weight:700;color:#185FA5;">' + fmtFull(kidsTotal) + '</span></div>' +
    '<div style="font-size:12px;color:#666;margin-top:10px;padding-top:10px;border-top:0.5px solid #e0e0d8;">Sammie 529 glide path — reduce stock 10% each July. Both kids overlap in college 2033–2037. Both done before retirement in 2037.</div></div>';
  document.getElementById('tab-savings').innerHTML = savingsHTML;

  // INCOME & TAX TAB
  var incomeHTML = '<div class="grid-4">' +
    '<div class="metric"><div class="metric-label">Nick 2026E comp</div><div class="metric-value">' + fmt(inc.nick_comp) + '</div><div class="metric-sub">Salary + RSU + bonus</div></div>' +
    '<div class="metric"><div class="metric-label">Emily 2026E comp</div><div class="metric-value">' + fmt(inc.emily_comp) + '</div><div class="metric-sub">Salary + MEP + bonus</div></div>' +
    '<div class="metric"><div class="metric-label">Total household</div><div class="metric-value">' + fmt(inc.total_comp) + '</div><div class="metric-sub">2026 estimate</div></div>' +
    '<div class="metric"><div class="metric-label">Tax refund est.</div><div class="metric-value" style="color:#3B6D11;">+$' + parseInt(inc.tax_refund).toLocaleString() + '</div><div class="metric-sub">Withholding dialed in</div></div>' +
    '</div>' +
    '<div class="card"><div class="section-label">2026 savings — all maxed</div>' +
    '<div class="row"><span style="color:#666;">401k contributions (both)</span><span><span class="badge bg-green" style="margin-right:6px;">Maxed</span>' + fmt(inc.contrib_401k) + '</span></div>' +
    '<div class="row"><span style="color:#666;">Employer match (both)</span><span><span class="badge bg-green" style="margin-right:6px;">Auto</span>' + fmt(inc.contrib_match) + '</span></div>' +
    '<div class="row"><span style="color:#666;">Mega backdoor Roth (both)</span><span><span class="badge bg-green" style="margin-right:6px;">Maxed</span>' + fmt(inc.contrib_mega) + '</span></div>' +
    '<div class="row"><span style="color:#666;">Backdoor Roth (both)</span><span><span class="badge bg-green" style="margin-right:6px;">Done</span>' + fmt(inc.contrib_backdoor) + '</span></div>' +
    '<div class="row"><span style="font-weight:700;">Total annual retirement savings</span><span style="font-weight:700;color:#3B6D11;font-size:14px;">' + fmt(inc.contrib_total) + '</span></div>' +
    '</div>' +
    '<div class="card"><div class="section-label">2026 tax estimate</div>' +
    '<div class="row"><span style="color:#666;">Taxable income</span><span style="font-weight:700;">' + fmt(inc.taxable_income) + '</span></div>' +
    '<div class="row"><span style="color:#666;">Federal tax owed</span><span style="font-weight:700;">' + fmt(inc.federal_tax) + '</span></div>' +
    '<div class="row"><span style="color:#666;">Paycheck taxes paid</span><span style="font-weight:700;">' + fmt(inc.paycheck_tax) + '</span></div>' +
    '<div class="row"><span style="color:#666;">Effective rate</span><span style="font-weight:700;">' + inc.effective_rate + '%</span></div>' +
    '<div class="row"><span style="font-weight:700;">Estimated refund</span><span style="font-weight:700;color:#3B6D11;">+$' + parseInt(inc.tax_refund).toLocaleString() + '</span></div>' +
    '</div>';
  document.getElementById('tab-income').innerHTML = incomeHTML;

}).catch(function(err) {
  console.error(err);
  document.querySelectorAll('.panel').forEach(function(p){ p.innerHTML = '<div class="loading">Error loading data. Check sheet is published.</div>'; });
});

function showTab(name){
  document.querySelectorAll('.panel').forEach(function(p){ p.classList.remove('active'); });
  document.querySelectorAll('.tab-btn').forEach(function(b){ b.classList.remove('active'); });
  document.getElementById('tab-'+name).classList.add('active');
  event.target.classList.add('active');
}
</script>
</body>
</html>
